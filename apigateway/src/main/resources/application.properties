spring.application.name=apigateway
server.port=8090


#Keycloak
keycloak.auth.jwk-set-uri=http://localhost:8091/realms/ticketing-security-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8091/realms/ticketing-security-realm



# Actuator
management.health.circuitbreakers.enabled=true

#expose all endpoints (For circuitbreaker)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always



#Circuit Breaker (core behavior)
#Sliding window
#slidingWindowType=COUNT_BASED
#slidingWindowSize=8
#Tracks last 8 calls (not time-based)

#Failure threshold
#failureRateThreshold=50
#minimum-number-of-calls=4
#Circuit opens if:
#at least 4 calls made
#? 50% fail

#Open state
#waitDurationInOpenState=5s
#Once open:
#blocks all calls for 5 seconds
#Half-open state
#permittedNumberOfCallsInHalfOpenState=2
#automaticTransitionFromOpenToHalfOpenEnabled=true
#After 5s:
#allows 2 test calls
#if they succeed ? closes
#if they fail ? opens again

#Health indicator
#registerHealthIndicator=true
#Exposes circuit breaker status to Actuator

#Time Limiter
#timeout-duration=3s
#If a call takes > 3 seconds:
#it is treated as failed (timeout)

#Retry
#max-attempts=3
#wait-duration=2s

#On failure:
#retry up to 3 times
#wait 2 seconds between retries




#Resilinece4j Properties
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=8
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=4
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.timelimiter.configs.default.timeout-duration=3s
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s